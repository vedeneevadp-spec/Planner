<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="application-name" content="Chaotika" />
    <meta
      name="description"
      content="Chaotika — простой планер для задач, списков, рутин и повседневных дел. Войдите или создайте аккаунт, чтобы собрать всё в одном месте."
    />
    <meta name="theme-color" content="#214e42" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chaotika" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Chaotika — планер для реальной жизни</title>
    <script>
      ;(() => {
        const storageKey = 'chaotika.color-theme'
        const darkThemeColor = '#0f1714'
        const lightThemeColor = '#214e42'

        try {
          const storedTheme = window.localStorage.getItem(storageKey)
          const theme =
            storedTheme === 'dark' || storedTheme === 'light'
              ? storedTheme
              : window.matchMedia?.('(prefers-color-scheme: dark)')?.matches
                ? 'dark'
                : 'light'

          document.documentElement.dataset.theme = theme
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute(
              'content',
              theme === 'dark' ? darkThemeColor : lightThemeColor,
            )
        } catch {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>

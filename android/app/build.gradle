def releaseSigningProperties = new Properties()
def releaseSigningPropertiesFile = rootProject.file('keystore.properties')

if (releaseSigningPropertiesFile.exists()) {
    releaseSigningPropertiesFile.withInputStream { stream ->
        releaseSigningProperties.load(stream)
    }
}

def readReleaseSigningValue = { propertyName, envName ->
    def propertyValue = releaseSigningProperties.getProperty(propertyName)

    if (propertyValue != null && !propertyValue.trim().isEmpty()) {
        return propertyValue.trim()
    }

    def envValue = System.getenv(envName)
    return envValue != null && !envValue.trim().isEmpty() ? envValue.trim() : null
}

def resolveReleaseSigningFile = { filePath ->
    if (filePath == null) {
        return null
    }

    def candidate = new File(filePath)
    return candidate.isAbsolute() ? candidate : rootProject.file(filePath)
}

def releaseStoreFilePath = readReleaseSigningValue('storeFile', 'ANDROID_KEYSTORE_PATH')
def releaseStorePassword = readReleaseSigningValue('storePassword', 'ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = readReleaseSigningValue('keyAlias', 'ANDROID_KEY_ALIAS')
def releaseKeyPassword = readReleaseSigningValue('keyPassword', 'ANDROID_KEY_PASSWORD')
def hasReleaseSigningConfig = [
    releaseStoreFilePath,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { value -> value != null }

apply plugin: 'com.android.application'

android {
    namespace = "ru.chaotika.app"
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (hasReleaseSigningConfig) {
                storeFile resolveReleaseSigningFile(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    defaultConfig {
        applicationId "ru.chaotika.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.0.4"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigningConfig) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

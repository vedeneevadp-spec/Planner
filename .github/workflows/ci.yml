name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - run: node ./scripts/actionlint.mjs

  quality:
    runs-on: ubuntu-latest
    env:
      API_DB_RLS_MODE: transaction_local
      DATABASE_URL: postgres://planner:planner@127.0.0.1:5432/planner_ci

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: planner_ci
          POSTGRES_PASSWORD: planner
          POSTGRES_USER: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d planner_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install pinned npm
        run: |
          npm_version="$(node ./scripts/print-pinned-npm-version.mjs)"
          npm install -g "npm@${npm_version}"
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:security:check
      - run: npm run db:runtime-role:setup
        env:
          DB_RUNTIME_PASSWORD: planner_runtime
      - run: npm run db:security:check
        env:
          DATABASE_URL: postgres://planner_runtime:planner_runtime@127.0.0.1:5432/planner_ci
          DB_SECURITY_REQUIRE_NON_OWNER: '1'
      - run: npm run ci
      - run: npm run test:api:postgres
      - run: npm run smoke:api:prod
        env:
          API_AUTH_MODE: jwt
          API_CORS_ORIGIN: http://127.0.0.1:5173
          AUTH_JWT_SECRET: planner-ci-jwt-secret-with-at-least-32-chars
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build:analyze
      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: web-bundle-stats
          path: tmp/web-bundle-stats.html
          retention-days: 14

  android:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: http://127.0.0.1:3001
      VITE_AUTH_PROVIDER: planner

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install pinned npm
        run: |
          npm_version="$(node ./scripts/print-pinned-npm-version.mjs)"
          npm install -g "npm@${npm_version}"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - run: npm ci
      - run: npm run mobile:ci-check
      - run: npm run mobile:android:ci
